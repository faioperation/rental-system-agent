<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="customer-page-new">

<div class="shell customer-shell-new">

  <!-- LEFT RAIL: Past Sessions -->
  <aside class="rail">
    <div class="rail-brand">
      <span class="brand-mark">A</span>
      <span class="brand-name">Aria - Find Your Next Home</span>
    </div>
    
    <button class="rail-btn-ghost" id="new-session-btn" style="margin-bottom: 24px;">+ New Chat</button>

    <div class="rail-label">Recent Conversations</div>
    <div class="rail-nav" id="session-list">
      <!-- Session items will be dynamically injected here -->
    </div>
  </aside>

  <!-- CENTER STAGE: Chat Area -->
  <main class="stage">
    <div class="view" id="view-chat">
      <div class="chat-scroll" id="chat-scroll">
        <div class="msg agent">
          <div class="msg-bubble">
            Hi, I'm Aria 👋 Tell me what you're looking for...
          </div>
        </div>
      </div>

      <div class="error-banner" id="error-banner" style="display: none; color: var(--accent-danger); font-size: 13px; text-align: center; margin-bottom: 10px; font-weight: 600;"></div>

      <form class="composer-new" id="composer">
        <label for="chat-file-input" class="attach-btn" title="Attach document (.txt, .md, .csv)">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"></path>
          </svg>
        </label>
        <input type="file" id="chat-file-input" accept=".txt,.md,.csv" style="display: none;"/>
        
        <textarea id="composer-input" rows="2" placeholder="Type your message…" required></textarea>
        <button type="submit" id="send-btn">Send</button>
      </form>
    </div>
  </main>

  <!-- RIGHT PANEL: File Sharing -->
  <aside class="analysis">
    <div class="analysis-header">
      Shared Context
    </div>
    <div class="a-sub" style="margin-bottom: 16px;">
      Documents uploaded in the chat will appear here. They provide context to Aria for this session.
    </div>
    
    <div id="file-upload-status" class="kb-status" style="display: none; margin-bottom: 16px;"></div>

    <div style="margin-top: 24px;">
      <div class="rail-label">Session Files</div>
      <div class="ticket-list" id="session-files-list">
        <div class="a-sub">No files shared yet.</div>
      </div>
    </div>
  </aside>

</div>

<script src="/static/js/chat.js"></script>
</body>
</html>
